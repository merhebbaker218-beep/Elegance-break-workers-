<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elegance Break App</title>
    <style>
        body {
            font-family: Tahoma, Arial, sans-serif;
            background-color: #f7f8fc;
            margin: 0;
            padding: 0;
            color: #333;
        }
        header {
            background-color: #5865f2;
            color: white;
            padding: 15px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        h1 {
            font-size: 1.4rem;
            margin: 0;
            text-align: center;
            padding: 15px 0;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 15px;
        }
        .card {
            background: white;
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            margin-bottom: 15px;
        }
        .form-group {
            display: flex;
            gap: 10px;
            margin-bottom: 12px;
        }
        select, input {
            padding: 10px;
            font-size: 1rem;
            border-radius: 8px;
            border: 1px solid #ccc;
            flex: 1;
            outline: none;
        }
        .btn-primary {
            background-color: #344154;
            color: white;
            border: none;
            cursor: pointer;
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            margin-bottom: 10px;
        }
        .btn-primary:hover {
            background-color: #232b38;
        }
        .btn-add {
            background-color: #344154;
            color: white;
            border: none;
            cursor: pointer;
            padding: 0 15px;
            border-radius: 8px;
            font-size: 1.2rem;
            font-weight: bold;
        }
        .btn-success {
            background-color: #2ecc71;
            color: white;
            border: none;
            cursor: pointer;
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 1.1rem;
        }
        .btn-success:hover {
            background-color: #27ae60;
        }
        .section-title {
            font-size: 1.1rem;
            font-weight: bold;
            margin-bottom: 8px;
        }
    </style>
</head>
<body>

    <header>
        <span style="font-size: 1.4rem; cursor: pointer;">☰</span>
        <span style="font-size: 1.1rem; font-weight: bold;">Elegance break app</span>
        <span></span>
    </header>

    <div class="container">
        <h1>نظام تسجيل الاستراحات</h1>

        <!-- قسم الإدخال -->
        <div class="card">
            <div class="form-group">
                <input type="text" id="newWorkerInput" placeholder="اسم جديد...">
                <select id="workerSelect">
                    <option value="" disabled selected>اختر عاملاً...</option>
                </select>
                <button class="btn-add" onclick="addNewWorker()">+</button>
            </div>

            <button class="btn-primary" onclick="registerAction('دخول الاستراحة')">تسجيل دخول الاستراحة</button>
            <button class="btn-primary" onclick="registerAction('خروج الاستراحة')">تسجيل خروج الاستراحة</button>
        </div>

        <!-- العمال المتواجدون -->
        <div class="card">
            <div class="section-title">العمال المتواجدون حالياً في الاستراحة:</div>
            <ul id="activeWorkersList" style="padding-right: 20px; margin: 0; font-size: 0.95rem;">
                <li>لا يوجد عمال داخل الاستراحة حالياً</li>
            </ul>
        </div>

        <!-- إجمالي الساعات -->
        <div class="card">
            <div class="section-title">إجمالي ساعات الاستراحة اليومية:</div>
            <p id="totalHoursText" style="margin: 0; font-size: 0.95rem;">إجمالي: 0.00 ساعة (0 دقيقة)</p>
        </div>

        <!-- زر التصدير إلى إكسل -->
        <button id="exportBtn" class="btn-success">تصدير إلى جدول إكسل (CSV)</button>
    </div>

    <!-- ربط ملف الجافا سكريبت -->
    <script src="script.js"></script>
</body>
</html>
